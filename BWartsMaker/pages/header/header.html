    <head>

    <body>
        
        <!-- Cabeçalho de acessbilidade -->
        <div class="cabecalho__acessibilidade container text-end">

            <button type="button" class="btn btn-outline-light" id="alto_contraste"><img src="../../img/header/alto_contraste.svg" alt="Ícone de alto contraste"></button>
            <button type="button" class="btn btn-outline-light" id="diminuir_fonte"><img src="../../img/header/diminuir_fonte.svg" alt="Ícone de diminuir fonte"></button>

                    <li><button class="dropdown-item" type="button" id="fonte_padrao" style="font-family: sans-serif;">Padrão</button></li>
                    <li><button class="dropdown-item" type="button" id="fonte_serifada" style="font-family: Times New Roman;">Serifada</button></li>
                    <li><button class="dropdown-item" type="button" id="fonte_open" style="font-family: OpenDyslexic;">Open Dyslexic</button></li>
                </ul>
            </div>
        </div>
        
        <header class="cabecalho container">
            

            <nav class="cabecalho__nav">
                <!-- As classes "texto__laranja" e "texto__cinza" se encontram no arquivo "css/styles.css" -->

                    <a href="../carrinho/carrinho.html"><img src="../../img/header/carrinho.svg" alt="Ícone do carrinho"></a>
                </div>
