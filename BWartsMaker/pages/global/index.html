<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Configurações iniciais -->
        <script src="../../js/global/fetch.js" defer></script>
        <script src="../../js/global/include.js" defer></script>

        
    </head>

    <body>
        
        <div id="header" class="w-100"></div> 
        
        <main class="container-xxl">
            <!-- Carrossel principal -->
            <section id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
                <!-- Slides do carrossel -->
                <div class="carousel-inner py-2">
                    <div class="carousel-item active">
                        <img src="../../img/home/slide1.png" class="d-block w-100" alt="Banner promoção de 60%">
                    </div>
                    <div class="carousel-item">
                        <img src="../../img/home/slide2.png" class="d-block w-100" alt="Banner novidades do dia">
                    </div>
                    <div class="carousel-item">
                        <img src="../../img/home/slide3.png" class="d-block w-100" alt="Banner frete grátis">
                    </div>
                </div>
                <!-- Botão esquerdo -->
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <!-- Botão direito -->
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </section>

            <!-- Seção novidades -->
            <section class="swiper">
                <div class="card-wrapper">
                    <ul class="swiper-wrapper">
                        <li class="swiper-slide">

                            <div class="card" style="width: 13rem;">
                                <img src="../../img/assets/produto.png" class="card-img-top" alt="...">
                                <div class="card-body pt-4">
                                    <h5 class="">Produto legal de mdf com 21mm x 90mm</h5>
                                    <p class="">R$100,00</p>
                                </div>
                            </div>
                        
                        </li>
                    </ul>

                    <!-- Configuração de paginação -->
                    <div class="swiper-pagination"></div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                </div>
            </section>

            <!-- Seção de personalização do projeto -->
            <section class="personalizacao">
                <div class="personalizacao__banner">
                    <a href="#"><img src="../../img/home/personalizeAqui.png" alt="Imagem do banner da plataforma de pesonalização" class="personalizacao__banner__imagem"></a>
                </div>
            </section>
        </main>
        
        <div id="footer" class="w-100"></div>
    </body>
</html>
