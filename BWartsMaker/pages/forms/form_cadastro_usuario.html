<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="../styles/forms.css">
        
        <script src="../../js/global/include.js" defer></script>
        <script src="../../js/global/fetch.js" defer></script>
        <script src="../../js/global/preferenciaFonte.js" defer></script>

        <!-- Validação de inputs -->
        <script src="../../js/validacoes/validacaoCadastro.js" defer></script>
    </head>
    
    <body class="fundo__form">
        <main>
            <form method="post" class="container py-5 d-flex justify-content-center align-items-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card-body p-5 text-center text-white shadow rounded fundo__escuro" style="border-radius: 1rem;">
                        <img src="../../img/assets/Logo.svg" alt="Logo BWarts" class="logo">

                        <div class="mb-md-5 mt-md-4">
                            <h4 class="fw-semibold mb-4 mt-5 text-uppercase">Cadastre-se</h4>

                            <!-- Nome -->
                            <div class="mb-3">
                                <input type="text" id="nome_user" name="nome" placeholder="Nome de usuário" class="form-control" required/>
                                <span class="erro" id="erro_nome"></span>
                            </div>

                            <!-- E-mail -->
                            <div class="mb-3">
                                <input type="email" id="email_user" name="email" placeholder="E-mail" class="form-control" required/>
                                <span class="erro" id="erro_email"></span>
                            </div>

                            <!-- CPF, DDD, Telefone -->
                            <div class="row g-2 mb-3">
                                <div class="col-5">
                                    <input type="tel" id="cpf_user" name="cpf" placeholder="CPF" class="form-control" required/>
                                </div>
                                <div class="col-2">
                                    <input type="tel" id="ddd_user" name="ddd" placeholder="DDD" class="form-control" required/>
                                </div>
                                <div class="col-5">
                                    <input type="tel" id="telefone_user" name="telefone" placeholder="Telefone" class="form-control" required/>
                                </div>
                                <span class="erro" id="erro_cpf"></span>
                                <span class="erro" id="erro_ddd"></span>
                                <span class="erro" id="erro_telefone"></span>
                            </div>

                            <!-- Senha -->
                            <div class="row g-2 mb-3">
                                <div class="col">
                                    <input type="password" id="senha_user" placeholder="Senha" class="form-control" required/>
                                    
                                </div>
                                <div class="col">
                                    <input type="password" id="confirmar_senha" placeholder="Confirmar senha" class="form-control" required/>
                                    
                                </div>
                            </div>
                            <p class="text-start text-white-50 lh-1 obs__senha">Senha deve ter no mínimo: 8 caracteres, um número, uma letra minúscula, uma letra maiúscula.</p>
                            <span class="erro" id="erro_senha_fraca"></span>
                            <span class="erro" id="erro_senha_tamanho"></span>
                            <span class="erro" id="erro_confirmar"></span>

                            <!-- Confirmar cadastro -->
                            <div class="mt-4">
                                <div class="my-2 d-flex flex-wrap justify-content-between align-items-center gap-3">
                                    <img src="../../img/forms/captcha.svg" alt="captcha" class="captcha">
                                    <div class="d-flex justify-content-end" style="flex: 0 0 auto;">
                                        <button class="btn text-white btn-outline btn-lg px-4 border-2 botao__cadastrar" id="botao_cadastrar" type="submit">Cadastrar</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div>
                            <p class="mb-0">Já possui conta? <a href="form_login.html" class="text-white-50 fw-bold">Faça login</a></p>
                        </div>

                        <div class="d-flex align-items-center gap-2 my-2">
                            <hr class="flex-grow-1 m-0">
                            <p class="m-0">ou</p>
                            <hr class="flex-grow-1 m-0">
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-light" id="botao_login_google" type="button"><img src="../../img/forms/google.png" alt="Logo google" width="30rem;"> Entre com o Google</button>
                            <button class="btn btn-outline-light" id="botao_login_facebook" type="button"><img src="../../img/forms/facebook_cadastro.svg" alt="Logo facebook" width="30rem;"> Entre com o Facebook</button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </body>
</html>
