<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="../styles/forms.css">
        
        <script src="../../js/global/include.js" defer></script>
        <script src="../../js/global/fetch.js" defer></script>
        <script src="../../js/global/preferenciaFonte.js" defer></script>

        <!-- Validação de inputs -->
        <script src="../../js/validacoes/validacaoLogin.js" defer></script>
    </head>
    
    <body class="fundo__form">
        <main>
            <form method="post" class="container py-5 d-flex justify-content-center align-items-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card-body p-5 text-center text-white shadow rounded fundo__escuro" style="border-radius: 1rem;">
                        <!-- Logo BWarts -->
                        <img src="../../img/assets/Logo.svg" alt="Logo BWarts" class="logo">

                        <!-- Inputs do usuário -->
                        <div class="mb-md-5 mt-md-4">
                            <h4 class="fw-semibold mb-4 mt-5 text-uppercase">Login</h4>

                            <!-- E-mail -->
                            <div class="mb-3">
                                <input type="email" id="email_user" name="email" placeholder="E-mail" class="form-control" required/>
                            </div>
                            
                            <!-- Senha -->
                            <div class="mb-3">
                                <input type="password" id="senha_user" name="senha" placeholder="Senha" class="form-control" required/>
                                <span class="erro" id="erro_senha"></span>
                            </div>
                            <span class="erro" id="erro_email"></span>
                            <span class="erro" id="erro_login"></span>

                            <!-- Botão entrar -->
                            <div>
                                <button class="btn text-white btn-outline btn-lg px-4 border-2 botao__cadastrar" id="botao_cadastrar" type="submit">Entrar</button>
                            </div>
                        </div>

                        <!-- Cadastrar-se -->
                        <div>
                            <p class="mb-0">Não possui conta? <a href="form_cadastro_usuario.html" class="text-white-50 fw-bold">Cadastre-se</a></p>
                        </div>

                        <!-- Divisória "-ou-" -->
                        <div class="d-flex align-items-center gap-2 my-2">
                            <hr class="flex-grow-1 m-0">
                            <p class="m-0">ou</p>
                            <hr class="flex-grow-1 m-0">
                        </div>

                        <!-- Logins alternativos -->
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-light" id="botao_login_google" type="button"><img src="../../img/forms/google.png" alt="Logo google" width="30rem;"> Entre com o Google</button>
                            <button class="btn btn-outline-light" id="botao_login_facebook" type="button"><img src="../../img/forms/facebook_cadastro.svg" alt="Logo facebook" width="30rem;"> Entre com o Facebook</button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </body>
</html>
