<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../js/include.js" defer></script>
    <script src="../js/fetch.js" defer></script>
    <link rel="stylesheet" href="../css/carrinho.css">
    <title>Document</title>
</head>
<body>
    <div id="header"></div>
    <main>
        <section class="secao__carrinho">
            <div class="secao__carrinho__bloco__tabela">
                <h1 class="carrinho__titulo">Meu carrinho</h1>
                <table class="carrinho__tabela">
                    <tr class="carrinho__tabela__cabecalho">
                        <th class="carrinho__tabela__cabecalho__item">Produto</th>
                        <th class="carrinho__tabela__cabecalho__item">Frete</th>
                        <th class="carrinho__tabela__cabecalho__item">Quantidade</th>
                        <th class="carrinho__tabela__cabecalho__item">Total</th>
                    </tr>
                    <tr class="carrinho__tabela__informacoes">
                        <td>
                            <div>
                                <img src="../img/assets/produto.png" alt="Imagem do produto">
                                <p>Produto muito legal e bom de 21mmx30mm - mdf</p>
                            </div>
                        </td>
                        <td>
                            <p>R$10,00</p>
                        </td>
                        <td>
                            <div>
                                <button>-</button>
                                <p>1</p>
                                <button>+</button>
                            </div>
                            <div>
                                <img src="#" alt="Imagem de uma lixeira">
                                <p>Remover</p>
                            </div>
                        </td>
                        <td>
                            <p>R$110,00</p>
                        </td>
                    </tr>
                </table>
            </div>
            <div>
                <h2>Valor total</h2>
            </div>
        </section>
    </main>
    <div id="footer"></div>
</body>
</html>
