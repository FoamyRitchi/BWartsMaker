<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="../js/include.js" defer></script>
        <script src="../js/validacoes/validacaoLogin.js" defer></script>
        <title>Login</title>
    </head>

    <body class="fundo__form">
        <main>
            <section>
                <div class="form">
                    <h1 class="form__logo"><span class="texto__laranja">BW</span><span class="texto__cinza">arts</span></h1>
                    <h2 class="form__titulo margin__bottom__zero margin__top__zero">Faça Login</h2>

                    <!-- Posteriormente o formulário vai fzr action com método post para a API Java Spring -->
                    <form class="form__login">
                        <input type="text" id="cpf_user" name="cpf" placeholder="CPF" required class="form__input__cpf__login">
                        <span class="erro" id="cpf_erro"></span>

                        <input type="password" id="senha_user" name="senha" placeholder="Senha" required class="form__input__senha__login">
                        <span class="erro" id="senha_erro"></span>

                        <div class="form__login__container__botao">
                            <!-- Sem link ainda, apenas para simular login -->
                            <button type="button" class="form__login__botao" onclick="window.location.href='user_visao_geral.html'">Entrar</button>
                        </div>

                        <div>
                            <p class="form__cadastro__texto margin__bottom__zero margin__top__zero">Não possui conta? <a href="form_cadastro_usuario.html" class="form__faca__login">Cadastre-se</a></p>
                            <p class="linhas__lados margin__top__zero margin__bottom__zero">Ou</p>
                            <div class="form__cadastro__redes">
                                <button type="button" class="form__cadastro__redes__botao"><img src="../img/forms/google.svg" alt="Google" class="form__redes__icone"> Entre com Google</button>
                                <button type="button" class="form__cadastro__redes__botao"><img src="../img/forms/facebook_cadastro.svg" alt="Facebook" class="form__redes__icone"> Entre com Facebook</button>
                            </div>
                        </div>
                    
                    </form>         
                </div>  
            </section>
        </main>
    </body>
</html>
