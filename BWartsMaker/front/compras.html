<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- O include.js vai inserir os dados aqui -->
        <script src="../js/include.js" defer></script>
        <script src="../js/fetch.js"></script>
        
    </head>
    <body>
        
    <!-- Inserção do header.html na página -->
    <div id="header"></div>
        <main>
            <!-- SEÇÂO: Informações do produto -->
            <section class="produto">
                <div class="produto__imagens">
                    <img src="../RETANGULO.svg" alt="">
                    <img src="../RETANGULO.svg" alt="">
                    <img src="../RETANGULO.svg" alt="">
                </div>
                <div class="produto__imagem__principal">
                    <img src="../RETANGULOGRANDE.svg" alt="">
                </div>
                <div class="produto__compra">
                    <img src="../INFOSPRODUTO.svg" alt="">
                </div>
            </section>

            <!-- SEÇÃO: Descrição do produto -->
            <section>
                <div class="descricao">

                </div>
                <div>

                </div class="avaliacoes">
            </section>

            <!-- CARDS: Seção de novidades -->
            <section class="novidades">
                <!-- Todas as classes relacionadas a cards estão no arquivo styles.css -->
                <h2 class="cards__titulo">Últimas novidades</h2>
                <div class="cards">
                    <div class="cards__estrela">
                        <img src="../img/assets/estrela.svg" alt="Ícone de estrela">
                    </div>
                    <img src="../img/assets/produto.png" alt="Imagem do produto">
                    <p class="cards__nome__produto">Produto legal de mdf com 21mm x 90mm </p>
                    <div class="cards__precos">
                        <h3 class="cards__preco">R$999,99</h3>
                        <p class="cards__parcela">p10x s/juros</p>
                    </div>
                </div>
            </section>

            <!-- Seção de cards de produtos baseados nas pesquisas do usuário -->
            <section class="pesquisas">
                <!-- Todas as classes relacionadas a cards estão no arquivo styles.css -->
                <h2 class="cards__titulo__pesquisa">Baseado em suas pesquisas</h2>
                <div class="cards">
                    <div class="cards__estrela">
                        <img src="../img/assets/estrela.svg" alt="Ícone de uma estrela">
                    </div>
                    <img src="../img/assets/produto.png" alt="Imagem do produto">
                    <p class="cards__nome__produto">Produto legal de mdf com 21mm x 90mm </p>
                    <div class="cards__precos">
                        <h3 class="cards__preco">R$999,99</h3>
                        <p class="cards__parcela">p10x s/juros</p>
                    </div>
                </div>
            </section>
        </main>
        
        <div id="footer"></div>
    </body>
</html>
