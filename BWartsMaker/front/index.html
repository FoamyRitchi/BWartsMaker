<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- O include.js vai inserir os dados aqui -->
    <script src="../js/include.js" defer></script>
</head>
<body>
    
<!-- Inserção do header.html na página -->
<div id="header"></div>
    <main>
        <!-- Seção do carrossel principal da página -->
        <section class="principal">
            <img src="../img/teste.png" alt="primeira imagem do carrossel" class="principal__imagem__carrossel">
            <!-- #TESTE# Tira a visibilidade do bloco com "display: none;" para futura utilização dos blocos -->
            <div style="display: none;">
                <img src="#" alt="Segunda imagem do carrossel">
                <img src="#" alt="Terceira imagem do carrossel">
            </div>
        </section>

        <!-- CARDS: Seção de novidades -->
        <section class="novidades">
            <h2 class="cards__titulo">Últimas novidades</h2>
            <div class="cards">
                <div class="cards__estrela">
                    <img src="../img/estrela.svg" alt="ícone de uma estrela">
                </div>
                <img src="../img/teste2.png" alt="Imagem do produto">
                <p class="cards__nome__produto">Produto legal de mdf com 21mm x 90mm </p>
                <div class="cards__precos">
                    <h3 class="cards__preco">R$999,99</h3>
                    <p class="cards__parcela">p10x s/juros</p>
                </div>
            </div>
        </section>

        <!-- Seção de cards de produtos baseados nas pesquisas do usuário -->
        <section class="pesquisas">
            <h2 class="cards__titulo__pesquisa">Baseado em suas pesquisas</h2>
            <div class="cards">
                <div class="cards__estrela">
                    <img src="../img/estrela.svg" alt="ícone de uma estrela">
                </div>
                <img src="../img/teste2.png" alt="Imagem do produto">
                <p class="cards__nome__produto">Produto legal de mdf com 21mm x 90mm </p>
                <div class="cards__precos">
                    <h3 class="cards__preco">R$999,99</h3>
                    <p class="cards__parcela">p10x s/juros</p>
                </div>
            </div>
        </section>

        <!-- Seção de personalização do projeto -->
        <section class="personalizacao">
            <div class="personalizacao__banner">
                <a href="#"><img src="../img/banner.svg" alt="Imagem do banner da plataforma de pesonalização" class="personalizacao__banner__imagem"></a>
            </div>
        </section>
    </main>
    
    <div id="footer"></div>

    <!-- Javascript para puxar o Header e o Footer -->
<script>
    fetch("header.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("header").innerHTML = data;
    });
    
    fetch("footer.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("footer").innerHTML = data;
    });
</script>
</body>
</html>
